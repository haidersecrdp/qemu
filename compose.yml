services:
  qemu:
    image: qemux/qemu
    container_name: qemu
    environment:
      BOOT: "https://iso.biglinux.com.br/biglinux_2026-05-04_k618.iso"
    devices:
      - /dev/kvm
      - /dev/net/tun
    cap_add:
      - NET_ADMIN
    ports:
      - 8006:8006
    volumes:
      - ./qemu:/storage
    restart: always
    stop_grace_period: 2m
